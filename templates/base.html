<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NutriAI{% endblock %}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/2.0.2/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="brand">🥗 NutriAI</a>
      <div class="nav-links">
        <a href="/">Home</a>
        {% if user %}
          <a href="/profile">My Profile</a>
          <a href="/plan">Today's Plan</a>
          <a href="/tracker">Meal Tracker</a>
          <a href="/progress">Progress</a>
          <a href="/settings">Settings</a>
          <a href="/logout" class="nav-cta">Logout ({{ user.username }})</a>
        {% else %}
          <a href="/auth" class="nav-cta">Login / Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
